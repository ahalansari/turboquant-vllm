name: Build and push gemma4 image

on:
  workflow_dispatch:
    inputs:
      vllm_tag:
        description: vLLM base image tag
        default: v0.19.0
      transformers_version:
        description: transformers version to pin
        default: 5.5.0
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - patch_kv_cache_utils.py

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: aalansari/vllm-turboquant:gemma4
          build-args: |
            VLLM_TAG=${{ github.event.inputs.vllm_tag || 'v0.19.0' }}
            TRANSFORMERS_VERSION=${{ github.event.inputs.transformers_version || '5.5.0' }}
